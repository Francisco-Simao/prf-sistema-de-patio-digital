<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
    <head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
    <title>PRF - PATIO DIGITAL</title>
</head>
<body>
    <header>
        <h1>PATIO DIGITAL - SISTEMA DE GESTÃO VEICULAR</h1>

    </header>
    <nav>
        <a href="index.html"><i class="fa-solid fa-house"></i></a>
        <a href="loginL.html"><i class="fa-solid fa-check"></i></a>
        <a href="dashboard.html"><i class="fa-solid fa-chart-column"></i></a>
    </nav>

    <div class="card consulta-card">
        <div class="cards">
            <h1>Cadastro De Veiculo</h1>
            <div class="inputs consulta-inputs">            
                <h2>Placa</h2>
                <input type="text" id="placa" placeholder="ABC1234">

                <h2>Modelo</h2>
                <input type="text" id="modelo" placeholder="Ex: Civic">

                <h2>CPF do proprietário</h2>
                <input type="text" id="cpf">

                <h2>Data de retenção</h2>
                <input type="date" id="dataRetencao">

                <h2>Taxa do guincho</h2>
                <input type="number" id="taxaGuincho">

                <h2>Valor da diária</h2>
                <input type="number" id="valorDiaria">
                <button onclick="cadastrarVeiculo()">Cadastrar</button>
            </div>



        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
