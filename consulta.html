<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
    <head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
    <title>PRF - PATIO DIGITAL</title>
</head>
<body onload="carregarConsulta()">
    <header>
        <h1>PATIO DIGITAL - SISTEMA DE GESTÃO VEICULAR</h1>

    </header>
    <nav>
        <a href="index.html"><i class="fa-solid fa-house"></i></a>
    </nav>

    <div class="card consulta-card">
        <div class="cards">
            <h1>Seu Veiculo</h1>
            <div class="inputs consulta-inputs">            
                <h2>Placa</h2>
                <input type="text" id="placa" class="consulta-input" readonly>
                <h2>Modelo</h2>
                <input type="text" id="modelo" class="consulta-input" readonly>

                <h2>CPF</h2>
                <input type="text" id="cpf" class="consulta-input" readonly>

                <h2>Data de retenção</h2>
                <input type="text" id="dataRetencao" class="consulta-input" readonly>

                <h2>Status</h2>
                <input type="text" id="status" class="consulta-input" readonly>

                <h2>Taxa do guincho</h2>
                <input type="text" id="taxaGuincho" class="consulta-input" readonly>

                <h2>Diária</h2>
                <input type="text" id="diaria" class="consulta-input" readonly>

                <h2>Dias no pátio</h2>
                <input type="text" id="diasPatio" class="consulta-input" readonly>

                <h2>Valor total</h2>
                <input type="text" id="valorTotal" class="consulta-input" readonly>

                <button onclick="irHistorico()">Histórico</button>
            </div>



        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
