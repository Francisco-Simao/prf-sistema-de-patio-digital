<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
    <head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
    <title>PRF - PATIO DIGITAL</title>
</head>
<body>
    <header>
        <h1>PATIO DIGITAL - SISTEMA DE GESTÃO VEICULAR</h1>
    </header>
    <nav>
        <a href="index.html"><i class="fa-solid fa-home"></i></a>
        <a href="login.html"><i class="fa-solid fa-plus"></i></a>
        <a href="dashboard.html"><i class="fa-solid fa-chart-column"></i></a>
    </nav>

    <div class="card">

        <div class="inputs">
            <h2>Liberar Veículo</h2>
            <input type="text" id="placa" placeholder="Placa" >
            <input type="text" id="modelo" placeholder="Modelo" >
            <input type="text" id="cpf" placeholder="CPF" >
            <input type="text" id="diasPatio" placeholder="Dias no pátio" >
            <input type="text" id="valorTotal" placeholder="Valor total" >
            <input type="date" id="dataLiberacao">
            <select id="formaPagamento">
            <option>Forma de pagamento</option>
            <option>Dinheiro</option>
            <option>Cartão</option>
            <option>PIX</option>
            </select>
            <textarea placeholder="Observações"></textarea>
            <button onclick="liberarVeiculo()">Liberar veículo</button>
        </div>

    </div>

    <script src="js/script.js"></script>
</body>
</html>
