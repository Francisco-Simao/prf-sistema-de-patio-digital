<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
    <head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
    <title>PRF - PATIO DIGITAL</title>
</head>
<body>
    <header>
        <h1>PATIO DIGITAL - SISTEMA DE GESTÃO VEICULAR</h1>

    </header>
    <nav>
        <a href="index.html"><i class="fa-solid fa-house"></i></a>
        <a href="cadastro.html"><i class="fa-solid fa-plus"></i></a>
        <a href="liberar.html"><i class="fa-solid fa-check"></i></a>
    </nav>

    <div class="card">

    <h1>Dashboard</h1>
        <div class="card-dash">
        <div id="veiculosPatio"  class="cards-board">
            <i id="icon" class="fa-solid fa-car"></i>
            <h3>Veículos no pátio</h3>
            <p >12</p>
        </div>

        <div  id="veiculosLiberados" class="cards-board">
            <i id="icon" class="fa-solid fa-sack-dollar"></i>
            <h3>Veículos liberados hoje</h3>
            <p>5</p>
        </div>
        </div>

        <div class="card-dash">
        <div id="valorArrecadado"  class="cards-board">
            <i id="icon" class="fa-solid fa-money-bill"></i>
            <h3>Valor arrecadado</h3>
            <p >R$ 2.500</p>
        </div>

        <div id="totalApreensoes" class="cards-board">
            <i id="icon" class="fa-solid fa-circle-check"></i>
            <h3>Total de apreensões</h3>
            <p >30</p>
        </div>
        </div>

    </div>

    
</body>
</html>
